# Configuration du bundle JWT (JSON Web Token)
# Gère l'authentification sans état (stateless) via tokens JWT
lexik_jwt_authentication:
    secret_key: '%env(resolve:JWT_SECRET_KEY)%'
    public_key: '%env(resolve:JWT_PUBLIC_KEY)%'
    pass_phrase: '%env(JWT_PASSPHRASE)%'
    # Durée de vie du token : 15 minutes (900 secondes)
    token_ttl: '%env(int:JWT_TTL)%'
    # Le token JWT est transmis dans l'en-tête Authorization: Bearer <token>
    token_extractors:
        authorization_header:
            enabled: true
            prefix: Bearer
            name: Authorization
