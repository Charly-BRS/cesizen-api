security:
    # Configuration du hachage des mots de passe
    # 'auto' choisit le meilleur algorithme disponible (bcrypt/argon2)
    password_hashers:
        App\Entity\User:
            algorithm: auto

    # Fournisseur d'utilisateurs : charge les users depuis la base de données via email
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        # Firewall de développement : désactive la sécurité pour le profiler Symfony
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Firewall pour la route de connexion JWT
        # json_login reçoit {"email": "...", "password": "..."} et retourne le token
        login:
            pattern: ^/api/auth/login
            stateless: true
            # UserChecker appelé avant l'émission du token → bloque les comptes désactivés à la connexion
            user_checker: App\Security\UserChecker
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # Firewall principal pour toutes les routes /api/
        # stateless : pas de session côté serveur, authentification via token JWT uniquement
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            # UserChecker appelé à chaque requête authentifiée → un compte désactivé après connexion
            # est bloqué immédiatement sur toutes ses nouvelles requêtes (l'user est rechargé en BDD)
            user_checker: App\Security\UserChecker
            jwt: ~

    # Contrôle d'accès par chemin URL
    # IMPORTANT : Symfony teste les règles dans l'ordre — la première qui correspond gagne.
    # Les règles spécifiques doivent toujours être placées AVANT les règles générales.
    access_control:
        # Connexion et inscription : accessible sans être authentifié
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/register, roles: PUBLIC_ACCESS }
        # Réinitialisation de mot de passe : accessible sans être connecté (flow public)
        - { path: ^/api/auth/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/reset-with-token, roles: PUBLIC_ACCESS }
        # Documentation Swagger : accessible sans authentification
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }
        - { path: ^/api/contexts, roles: PUBLIC_ACCESS }
        # Exercices de respiration en lecture : accessibles sans compte (CDC F20)
        # Seuls GET (liste et détail) sont publics — POST/PATCH/DELETE restent protégés
        - { path: ^/api/breathing_exercises, roles: PUBLIC_ACCESS, methods: [GET] }
        # Toutes les autres routes /api/ nécessitent d'être connecté
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

    # Hiérarchie des rôles : ROLE_ADMIN hérite de tous les droits de ROLE_USER
    role_hierarchy:
        ROLE_ADMIN: [ROLE_USER]
        ROLE_SUPER_ADMIN: [ROLE_ADMIN]

# Configuration spécifique aux tests : hachage rapide pour accélérer les tests
when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
