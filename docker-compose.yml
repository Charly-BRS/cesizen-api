# docker-compose.yml
# Orchestre les 3 services de l'API CESIZen :
# - php-fpm : exécute le code Symfony
# - postgres : base de données PostgreSQL 16
# - nginx : reverse proxy vers php-fpm

version: '3.9'

services:
  # Service PHP-FPM : exécute l'application Symfony
  php-fpm:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: cesizen_php
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=${APP_ENV:-dev}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET_KEY=%kernel.project_dir%/config/jwt/private.pem
      - JWT_PUBLIC_KEY=%kernel.project_dir%/config/jwt/public.pem
      - JWT_PASSPHRASE=${JWT_PASSPHRASE}
    networks:
      - cesizen_network
    depends_on:
      - postgres

  # Service PostgreSQL : base de données
  postgres:
    image: postgres:16-alpine
    container_name: cesizen_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cesizen}
      POSTGRES_USER: ${POSTGRES_USER:-cesizen_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cesizen_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cesizen_network

  # Service Nginx : reverse proxy
  nginx:
    image: nginx:alpine
    container_name: cesizen_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - cesizen_network
    depends_on:
      - php-fpm

volumes:
  postgres_data:

networks:
  cesizen_network:
    driver: bridge
