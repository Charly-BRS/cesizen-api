# Configuration Nginx pour proxifier vers PHP-FPM
#
# Pourquoi le resolver ?
#   Par défaut, Nginx résout les noms DNS à la compilation de sa configuration
#   (au démarrage). Si le container php-fpm n'est pas encore prêt, Nginx crashe
#   avec "host not found in upstream". En passant l'upstream via une variable
#   ($phpfpm_upstream), on force la résolution à la requête.
#   127.0.0.11 est le résolveur DNS interne de Docker (toujours disponible).
server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;

    # Résolveur DNS Docker : résout les noms de service au moment de la requête
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        # Redirige toutes les requêtes vers le front controller Symfony
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        # Variable : force la résolution DNS à chaque requête (pas au démarrage)
        set $phpfpm_upstream php-fpm:9000;
        fastcgi_pass $phpfpm_upstream;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        # Timeout élevé : Symfony génère le cache au 1er démarrage (peut être lent)
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
